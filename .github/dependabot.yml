version: 2
updates:
  # Root development toolchain (uv).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Group low-risk development updates to reduce pull-request noise.
      dev-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Self-contained project with its own dependencies (uv).
  - package-ecosystem: "uv"
    directory: "/intermediate/01-url-shortener-api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions used by the workflows (keeps pinned SHAs current).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
