name: Feature request
description: Suggest an improvement to an existing project or the tooling.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Suggesting a brand-new project? Use the **New project proposal** form
        instead.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the motivation, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
