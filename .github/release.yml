# Configuration for GitHub's automatically generated release notes.
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: New projects
      labels:
        - project
    - title: Features
      labels:
        - enhancement
    - title: Bug fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: Security
      labels:
        - security
    - title: Tooling and maintenance
      labels:
        - chore
        - ci
    - title: Dependency updates
      labels:
        - dependencies
    - title: Other changes
      labels:
        - "*"
