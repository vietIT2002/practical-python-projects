[project]
name = "url-shortener-api"
version = "0.1.0"
description = "A small URL shortener HTTP API built with FastAPI and SQLAlchemy."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "pydantic-settings>=2.4",
]

# This is a self-contained example service, not a distributable package.
[tool.uv]
package = false

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "httpx>=0.27",
    "mypy>=1.11",
    "ruff>=0.6",
]

[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = ["alembic"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "C4", "PTH", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["url_shortener"]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers --strict-config"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
# Alembic migration scripts are generated/boilerplate and not type-checked.
exclude = ['^alembic/']

[tool.coverage.run]
branch = true
source = ["url_shortener"]
omit = ["src/url_shortener/main.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
