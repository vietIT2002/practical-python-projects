[project]
name = "weather-cli"
version = "0.1.0"
description = "A command-line weather client using the free, key-less Open-Meteo API."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
]

[tool.uv]
package = false

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "mypy>=1.11",
    "ruff>=0.6",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "C4", "PTH", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["weather_cli"]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers --strict-config"
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "integration: hits the real Open-Meteo API; excluded by default",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true

[tool.coverage.run]
branch = true
source = ["weather_cli"]

[tool.coverage.report]
show_missing = true
skip_covered = true
