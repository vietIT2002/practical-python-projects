<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340" role="img" aria-label="Terminal demo: adding an expense, listing expenses, and printing a summary with the expense-tracker CLI">
  <title>Expense Tracker CLI demo</title>
  <rect width="720" height="340" rx="10" fill="#0B1220"/>
  <rect width="720" height="30" rx="10" fill="#152449"/>
  <rect y="20" width="720" height="10" fill="#152449"/>
  <circle cx="20" cy="15" r="5" fill="#ef4444"/>
  <circle cx="38" cy="15" r="5" fill="#f59e0b"/>
  <circle cx="56" cy="15" r="5" fill="#22c55e"/>
  <g font-family="'Cascadia Code', 'Consolas', 'DejaVu Sans Mono', monospace" font-size="14">
    <text x="16" y="58" fill="#38BDF8">$ <tspan fill="#F8FAFC">python -m expense_tracker add --amount 12.50 --category food</tspan></text>
    <text x="16" y="78" fill="#2DD4BF">Added expense b6990d2f: 12.50 food on 2026-07-18</text>
    <text x="16" y="108" fill="#38BDF8">$ <tspan fill="#F8FAFC">python -m expense_tracker list</tspan></text>
    <text x="16" y="128" fill="#93C5FD">ID        DATE            AMOUNT  CATEGORY</text>
    <text x="16" y="146" fill="#E2E8F0">b6990d2f  2026-07-18       12.50  food</text>
    <text x="16" y="164" fill="#E2E8F0">f30f9fe1  2026-07-20       40.00  travel</text>
    <text x="16" y="194" fill="#38BDF8">$ <tspan fill="#F8FAFC">python -m expense_tracker summary</tspan></text>
    <text x="16" y="214" fill="#E2E8F0">Total: 52.50</text>
    <text x="16" y="238" fill="#93C5FD">By category:</text>
    <text x="16" y="256" fill="#E2E8F0">  food             12.50</text>
    <text x="16" y="274" fill="#E2E8F0">  travel           40.00</text>
    <text x="16" y="306" fill="#38BDF8">$ <tspan fill="#64748B">_</tspan></text>
  </g>
</svg>
