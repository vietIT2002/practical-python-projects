<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200" role="img" aria-label="Flow diagram: scan the source directory, build a plan, then either print the plan on a dry run or apply the moves and write a manifest that undo can reverse">
  <title>Safe File Organizer flow</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748B"/>
    </marker>
  </defs>
  <style>
    .box { fill:#0F172A; stroke:#1E3A8A; stroke-width:2; }
    .safe { fill:#0F172A; stroke:#2DD4BF; stroke-width:2; }
    .label { fill:#F8FAFC; font-family:'Segoe UI',Arial,sans-serif; font-size:15px; }
    .sub { fill:#93C5FD; font-family:'Segoe UI',Arial,sans-serif; font-size:12px; }
    .edge { stroke:#64748B; stroke-width:2; fill:none; }
  </style>
  <rect width="760" height="200" fill="#0B1220"/>

  <rect class="box" x="20" y="80" width="130" height="52" rx="10"/>
  <text class="label" x="85" y="103" text-anchor="middle">Scan source</text>
  <text class="sub" x="85" y="121" text-anchor="middle">files only</text>

  <rect class="box" x="190" y="80" width="130" height="52" rx="10"/>
  <text class="label" x="255" y="103" text-anchor="middle">Build plan</text>
  <text class="sub" x="255" y="121" text-anchor="middle">no changes</text>

  <rect class="box" x="360" y="20" width="150" height="52" rx="10"/>
  <text class="label" x="435" y="43" text-anchor="middle">Print plan</text>
  <text class="sub" x="435" y="61" text-anchor="middle">dry run (default)</text>

  <rect class="safe" x="360" y="140" width="150" height="52" rx="10"/>
  <text class="label" x="435" y="163" text-anchor="middle">Apply + manifest</text>
  <text class="sub" x="435" y="181" text-anchor="middle">--apply</text>

  <rect class="safe" x="560" y="140" width="150" height="52" rx="10"/>
  <text class="label" x="635" y="163" text-anchor="middle">Undo</text>
  <text class="sub" x="635" y="181" text-anchor="middle">from manifest</text>

  <path class="edge" d="M150 106 H190" marker-end="url(#arrow)"/>
  <path class="edge" d="M320 100 C345 100 340 46 360 46" marker-end="url(#arrow)"/>
  <path class="edge" d="M320 112 C345 112 340 166 360 166" marker-end="url(#arrow)"/>
  <path class="edge" d="M510 166 H560" marker-end="url(#arrow)"/>
</svg>
