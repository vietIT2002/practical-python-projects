# Pre-commit hooks for the repository root.
#
# Ruff and mypy run through `uv run` (local hooks) so pre-commit uses exactly the
# same tool versions as the direct `uv run ...` commands and the two never drift.
# The hygiene hooks below come from a pinned, maintained upstream repository.
minimum_pre_commit_version: "3.8.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
