      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#152449"/>
    </linearGradient>
    <linearGradient id="ppp-tile2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
