    <path d="M39 41 L61 64 L39 87" fill="none" stroke="#38BDF8" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="70" y="75" width="10" height="12" rx="2.5" fill="#2DD4BF"/>
